name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: sudo apt-get update
      - run: sudo apt-get install libsdl2-dev
      - run: export CC=gcc
      - run: echo $CC
      - run: gcc --version
      - run: make
      - run: make debug LEVEL=4
  build-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: sudo apt-get update
      - run: sudo apt-get install clang libsdl2-dev
      - run: export CC=clang
      - run: echo $CC
      - run: clang --version
      - run: make
      - run: make debug LEVEL=4
