name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: sudo apt-get install libsdl2-dev
      - run: export CC=gcc-10
      - run: make
      - run: make debug LEVEL=4
