name: Build-All

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  Build-GCC:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - env:
        CC: gcc
      - run: sudo apt-get update
      - run: sudo apt-get install libsdl2-dev
      - run: echo $CC
      - run: gcc --version
      - run: make
      - run: make debug LEVEL=4
  Build-Clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - env:
        CC: clang
      - run: sudo apt-get update
      - run: sudo apt-get install clang libsdl2-dev
      - run: echo $CC
      - run: clang --version
      - run: make
      - run: make debug LEVEL=4
